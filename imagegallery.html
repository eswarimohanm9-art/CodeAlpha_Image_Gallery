<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Image Gallery</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
}

header{
text-align:center;
padding:30px;
}

header h1{
font-size:2.8rem;
margin-bottom:10px;
}

header p{
color:#cbd5e1;
}

.filters{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

.filters button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#334155;
color:white;
cursor:pointer;
transition:.3s;
}

.filters button:hover{
background:#2563eb;
transform:translateY(-2px);
}

.gallery{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding-bottom:40px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
cursor:pointer;
transition:.5s;
}

.card:hover img{
transform:scale(1.08);
}

.card h3{
padding:12px;
text-align:center;
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:90%;
max-height:80%;
border-radius:15px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:40px;
cursor:pointer;
color:white;
}

footer{
text-align:center;
padding:15px;
background:#111827;
color:#94a3b8;
}
</style>
</head>

<body>

<header>
<h1>📸  Image Gallery</h1>
</header>

<div class="filters">
<button onclick="filterImages('all')">All</button>
<button onclick="filterImages('nature')">Nature</button>
<button onclick="filterImages('city')">City</button>
<button onclick="filterImages('animal')">Animals</button>
</div>

<div class="gallery">

<div class="card nature">
<img src="https://picsum.photos/id/1015/600/400">
<h3>Nature View</h3>
</div>

<div class="card nature">
<img src="https://picsum.photos/id/1039/600/400">
<h3>Green Forest</h3>
</div>

<div class="card nature">
<img src="https://picsum.photos/id/1056/600/400">
<h3>Mountain View</h3>
</div>

<div class="card nature">
<img src="https://picsum.photos/id/1084/600/400">
<h3>Landscape</h3>
</div>

<div class="card city">
<img src="https://picsum.photos/id/1011/600/400">
<h3>City Lights</h3>
</div>

<div class="card city">
<img src="https://picsum.photos/id/1043/600/400">
<h3>Urban Life</h3>
</div>

<div class="card city">
<img src="https://picsum.photos/id/1060/600/400">
<h3>Modern Buildings</h3>
</div>

<div class="card animal">
<img src="https://picsum.photos/id/1025/600/400">
<h3>Wild Animal</h3>
</div>

<div class="card animal">
<img src="https://picsum.photos/id/237/600/400">
<h3>Cute Dog</h3>
</div>

<div class="card animal">
<img src="https://picsum.photos/id/1074/600/400">
<h3>Animal World</h3>
</div>

</div>

<div class="lightbox" id="lightbox">
<span class="close">&times;</span>
<img id="lightbox-img">
</div>

<footer>
© 2025 Professional Image Gallery Project
</footer>

<script>
const images=document.querySelectorAll(".card img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

images.forEach(img=>{
img.addEventListener("click",()=>{
lightbox.style.display="flex";
lightboxImg.src=img.src;
});
});

document.querySelector(".close").onclick=()=>{
lightbox.style.display="none";
};

lightbox.onclick=(e)=>{
if(e.target!==lightboxImg){
lightbox.style.display="none";
}
};

function filterImages(category){
const cards=document.querySelectorAll(".card");

cards.forEach(card=>{
if(category==="all"){
card.style.display="block";
}else{
card.style.display=
card.classList.contains(category)
? "block"
: "none";
}
});
}
</script>

</body>
</html>
